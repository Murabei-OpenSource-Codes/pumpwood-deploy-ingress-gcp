apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: ingress-gcp-gateway
spec:
  gatewayClassName: gke-l7-regional-external-managed
  # Set the public IP address for the gateway
  addresses:
  - type: NamedAddress
    value: {public_ip_name}

  # Define the listeners for the gateway, it will listen for HTTP and
  # HTTPS requests, but will redirect the HTTP requests to HTTPS.
  listeners:
  - name: http
    protocol: HTTP
    port: 80
    allowedRoutes:
      kinds:
      - kind: HTTPRoute
  
  - name: https
    protocol: HTTPS
    port: 443
    tls:
      # Terminate TLS with a regional Google-managed Certificate
      # Manager cert (see create_certificates.bash).
      mode: Terminate
      options:
        networking.gke.io/cert-manager-certs: "ingress-gcp-gateway-certificate"
    allowedRoutes:
      kinds:
      - kind: HTTPRoute

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ingress-gcp-gateway-redirect-route
spec:
  parentRefs:
  - name: ingress-gcp-gateway
    sectionName: http
  hostnames:
  - "{server_name}"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    filters:
    - type: RequestRedirect
      requestRedirect:
        scheme: https
        statusCode: 301

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ingress-gcp-gateway-app-route
spec:
  parentRefs:
  - name: ingress-gcp-gateway
    sectionName: https
  hostnames:
  - "{server_name}"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: {target_service}
      port: 80
---
apiVersion: networking.gke.io/v1
kind: HealthCheckPolicy
metadata:
  name: {target_service}-healthcheck
spec:
  targetRef:
    group: ""
    kind: Service
    name: {target_service}
  default:
    config:
      type: HTTP
      httpHealthCheck:
        requestPath: {health_check_path}
        port: 80